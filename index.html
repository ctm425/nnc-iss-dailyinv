<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNC Inventory — Central Command</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --primary: #1e3a5f; --primary-light: #2563eb; --primary-bg: #eff6ff;
  --danger: #dc2626; --success: #16a34a;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827;
  --radius: 10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

/* Login */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1e3a5f,#0f2440);display:flex;align-items:center;justify-content:center;z-index:100}
.login-overlay.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:40px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{color:var(--primary);margin-bottom:6px;font-size:1.4rem}
.login-box .subtitle{color:var(--gray-500);margin-bottom:24px;font-size:.9rem}
.login-box input{width:100%;padding:12px 16px;border:1px solid var(--gray-300);border-radius:8px;font-size:.95rem;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.login-box button{width:100%;padding:12px;background:var(--primary-light);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer}
.login-box button:hover{background:var(--primary)}
.login-error{background:#fef2f2;color:#991b1b;padding:10px;border-radius:8px;font-size:.85rem;margin-bottom:12px;display:none}

/* Header */
.header{background:linear-gradient(135deg,#1e3a5f,#0f2440);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.5rem;font-weight:800;letter-spacing:-.3px}
.header-sub{opacity:.7;font-size:.85rem;margin-top:2px}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.header-right span{font-size:.82rem;opacity:.8}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-primary{background:var(--primary-light);color:#fff}
.btn-sm{padding:6px 12px;font-size:.8rem}

/* Main container */
.dashboard{padding:32px;max-width:1300px;margin:0 auto}

/* Quick stats */
.quick-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:32px}
.quick-stat{background:#fff;border-radius:var(--radius);padding:16px 20px;border:1px solid var(--gray-200)}
.quick-stat .label{font-size:.72rem;text-transform:uppercase;color:var(--gray-500);font-weight:600;letter-spacing:.5px}
.quick-stat .value{font-size:1.5rem;font-weight:700;margin-top:4px}
.quick-stat .sub{font-size:.78rem;color:var(--gray-400);margin-top:2px}

/* Location cards — the big prominent buttons */
.locations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-bottom:40px}
.location-card{background:#fff;border-radius:14px;border:2px solid var(--gray-200);padding:0;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.location-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.12);border-color:transparent}
.location-card.placeholder{opacity:.65;cursor:default}
.location-card.placeholder:hover{transform:none;box-shadow:none;border-color:var(--gray-200)}
.location-header{padding:24px 28px 16px;display:flex;align-items:center;gap:16px}
.location-icon{font-size:2.4rem;width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.location-info h3{font-size:1.2rem;font-weight:700;margin-bottom:2px}
.location-info .loc-desc{font-size:.82rem;color:var(--gray-500);line-height:1.4}
.location-body{padding:0 28px 20px}
.location-sheets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.location-sheet-tag{font-size:.72rem;padding:4px 10px;border-radius:8px;font-weight:600;background:var(--gray-100);color:var(--gray-600)}
.location-footer{padding:12px 28px;border-top:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.location-footer .status{font-size:.78rem;font-weight:600}
.location-footer .status.active{color:var(--success)}
.location-footer .status.coming{color:var(--gray-400)}
.location-footer .arrow{font-size:1.1rem;color:var(--gray-400);transition:transform .15s}
.location-card:hover .arrow{transform:translateX(4px);color:var(--primary)}
.location-accent{height:5px}

/* Expanded location detail */
.location-detail{display:none;margin-bottom:32px}
.location-detail.visible{display:block}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.detail-header h2{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:10px}
.detail-header .back-btn{padding:6px 14px;border:1px solid var(--gray-300);border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;background:#fff;color:var(--gray-700);transition:all .15s}
.detail-header .back-btn:hover{background:var(--gray-100)}

.section-title{font-size:1rem;font-weight:700;color:var(--gray-700);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title .badge{background:var(--primary-bg);color:var(--primary);font-size:.72rem;padding:3px 10px;border-radius:12px;font-weight:600}

.sheet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px}
.sheet-card{background:#fff;border-radius:12px;border:1px solid var(--gray-200);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.sheet-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--primary-light)}
.sheet-card.disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.sheet-card .icon{font-size:1.8rem;margin-bottom:6px}
.sheet-card .name{font-size:1rem;font-weight:700;margin-bottom:3px}
.sheet-card .desc{font-size:.8rem;color:var(--gray-500);margin-bottom:10px;line-height:1.4}
.sheet-card .meta{display:flex;gap:8px;flex-wrap:wrap}
.sheet-card .tag{font-size:.7rem;padding:3px 10px;border-radius:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.sheet-card .tag.freq{background:#eff6ff;color:#2563eb}
.sheet-card .tag.status-ok{background:#f0fdf4;color:#16a34a}
.sheet-card .tag.coming-soon{background:var(--gray-100);color:var(--gray-400)}
.sheet-card .accent-bar{position:absolute;top:0;left:0;right:0;height:4px}

/* Tool tiles */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-bottom:32px}
.tool-tile{background:#fff;border-radius:14px;border:2px solid var(--gray-200);padding:24px 28px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tool-tile:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.12);border-color:transparent}
.tool-tile .tile-accent{position:absolute;top:0;left:0;right:0;height:5px}
.tool-tile .tile-icon{font-size:2rem;margin-bottom:8px}
.tool-tile .tile-title{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.tool-tile .tile-desc{font-size:.82rem;color:var(--gray-500);line-height:1.4;margin-bottom:12px}
.tool-tile .tile-meta{display:flex;gap:8px;flex-wrap:wrap}
.tool-tile .tile-tag{font-size:.7rem;padding:3px 10px;border-radius:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

/* Tool expanded panel */
.tool-panel{display:none;background:#fff;border-radius:14px;border:2px solid var(--gray-200);margin-bottom:32px;overflow:hidden}
.tool-panel.visible{display:block}
.tool-panel-header{padding:20px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100)}
.tool-panel-header h2{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:10px}
.tool-panel-body{padding:24px 28px}

/* Transfer ledger */
.ledger-table{width:100%;border-collapse:collapse;font-size:.85rem}
.ledger-table th{text-align:left;font-size:.7rem;text-transform:uppercase;color:var(--gray-500);padding:8px 10px;border-bottom:2px solid var(--gray-200);font-weight:700;letter-spacing:.3px}
.ledger-table td{padding:8px 10px;border-bottom:1px solid var(--gray-100)}
.ledger-table tr:hover td{background:var(--gray-50)}
.balance-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:700}
.balance-badge.owes{background:#fef2f2;color:#dc2626}
.balance-badge.clear{background:#f0fdf4;color:#16a34a}

/* Filter bar for tools */
.tool-filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:end;padding:12px 16px;background:var(--gray-50);border-radius:8px;margin-bottom:16px}
.tool-filter-bar .ff{display:flex;flex-direction:column;gap:3px}
.tool-filter-bar .ff label{font-size:.7rem;font-weight:600;color:var(--gray-500);text-transform:uppercase}
.tool-filter-bar .ff select,.tool-filter-bar .ff input{padding:6px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem}

/* User Management */
.user-mgmt{background:#fff;border-radius:12px;border:1px solid var(--gray-200);padding:24px;margin-bottom:32px}
.user-mgmt h3{font-size:1rem;font-weight:700;margin-bottom:16px}
.user-table{width:100%;border-collapse:collapse}
.user-table th{text-align:left;font-size:.72rem;text-transform:uppercase;color:var(--gray-500);padding:8px 12px;border-bottom:2px solid var(--gray-200)}
.user-table td{padding:10px 12px;border-bottom:1px solid var(--gray-100);font-size:.88rem}
.user-table select{padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem}

/* View-as banner */
.view-as-banner{background:#fef3c7;color:#92400e;padding:10px 24px;font-size:.85rem;font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.view-as-banner button{padding:4px 12px;border:1px solid #d97706;border-radius:6px;background:#fff;color:#92400e;font-size:.78rem;font-weight:600;cursor:pointer}

/* Prep data section */
.prep-section{background:#fff;border-radius:14px;border:2px solid var(--gray-200);padding:28px;margin-bottom:32px}
.prep-section h3{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.prep-section .prep-desc{font-size:.85rem;color:var(--gray-500);margin-bottom:16px;line-height:1.5}
.prep-locations{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.prep-loc-card{background:var(--gray-50);border-radius:10px;border:1px solid var(--gray-200);padding:16px 20px;display:flex;align-items:center;gap:14px}
.prep-loc-card .prep-icon{font-size:1.6rem;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prep-loc-card .prep-info .name{font-weight:700;font-size:.9rem}
.prep-loc-card .prep-info .status{font-size:.78rem;color:var(--gray-400);margin-top:2px}

@media(max-width:768px){
  .header{padding:12px 16px}
  .header h1{font-size:1.1rem}
  .header-right{gap:4px}
  .header-right .btn{padding:6px 10px;font-size:.72rem}
  .dashboard{padding:12px}
  .locations-grid{grid-template-columns:1fr}
  .sheet-grid{grid-template-columns:1fr}
  .sheet-card{padding:14px}
  .sheet-card .name{font-size:.88rem}
  .sheet-card .desc{font-size:.75rem}
  .location-card{padding:16px}
  .tools-grid{grid-template-columns:1fr}
  input[type="email"],input[type="password"],input[type="text"]{font-size:16px}
  .login-box{width:95%;padding:28px}
  .login-box button{min-height:44px;font-size:1rem}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>NNC Inventory System</h2>
    <p class="subtitle">Sign in to manage inventory across all locations</p>
    <div class="login-error" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="Email address">
    <input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')handleLogin()">
    <button id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div>
    <h1>Central Command</h1>
    <div class="header-sub">NNC Inventory Management System</div>
  </div>
  <div class="header-right">
    <span id="userInfo"></span>
    <span id="userRole" style="background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px;font-size:.75rem"></span>
    <select id="viewAsRole" style="display:none;padding:4px 8px;border:1px solid rgba(255,255,255,.3);border-radius:6px;font-size:.78rem;font-weight:600;background:rgba(255,255,255,.15);color:#fff;cursor:pointer" onchange="onViewAsRole(this.value)">
      <option value="">View as: Owner</option>
      <option value="manager">View as: Manager</option>
      <option value="staff">View as: Staff</option>
    </select>
    <button class="btn btn-ghost btn-sm" id="manageUsersBtn" onclick="toggleUserMgmt()" style="display:none">Manage Users</button>
    <button class="btn btn-ghost btn-sm" onclick="auth.signOut()">Sign Out</button>
  </div>
</div>

<!-- VIEW-AS BANNER -->
<div class="view-as-banner" id="viewAsBanner" style="display:none">
  <span>👁️ Previewing as: <strong id="viewAsLabel"></strong></span>
  <button onclick="onViewAsRole('')">Exit Preview</button>
</div>

<!-- MAIN CONTENT -->
<div class="dashboard" id="dashboardContent">
  <div id="quickStats" class="quick-stats"></div>

  <!-- LOCATIONS VIEW (main landing) -->
  <div id="locationsView">
    <div style="margin-bottom:20px">
      <div class="section-title" style="font-size:1.15rem">Your Locations</div>
    </div>
    <div class="locations-grid" id="locationsGrid"></div>

    <!-- TOOL TILES -->
    <div style="margin-bottom:20px;margin-top:12px">
      <div class="section-title" style="font-size:1.15rem">Tools & Reports</div>
    </div>
    <div class="tools-grid" id="toolsGrid"></div>

    <!-- PREP DATA SECTION -->
    <div id="prepDataSection" style="margin-top:12px"></div>

    <!-- CATERINGS SECTION (owner-only) -->
    <div id="cateringsSection" style="margin-top:12px"></div>
  </div>

  <!-- LOCATION DETAIL VIEW (sheets for a specific location) -->
  <div class="location-detail" id="locationDetail"></div>

  <!-- USER MANAGEMENT -->
  <div id="userMgmt" style="display:none"></div>
</div>

<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9rem;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none"></div>

<script src="shared.js?v=20260405"></script>
<script>
let selectedRestaurant = null;
let viewAsRole = ''; // empty = real role, otherwise simulated role for preview

// ==================== AUTH ====================
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { errorEl.textContent = 'Please enter email and password.'; errorEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...'; errorEl.style.display = 'none';
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (err) {
    errorEl.textContent = err.message; errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

auth.onAuthStateChanged(async (user) => {
  const overlay = document.getElementById('loginOverlay');
  if (user) {
    overlay.classList.add('hidden');
    const profile = await loadUserProfile();
    await updateUserProfile({ lastLogin: new Date() });
    document.getElementById('userInfo').textContent = profile.displayName || user.email;
    document.getElementById('userRole').textContent = ROLES[profile.role]?.label || profile.role;
    if (canManageUsers(profile)) document.getElementById('manageUsersBtn').style.display = '';
    if (profile.role === 'owner') document.getElementById('viewAsRole').style.display = '';
    renderMain();
  } else {
    overlay.classList.remove('hidden');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Sign In';
  }
});

// ==================== VIEW AS ROLE ====================
function getEffectiveProfile() {
  if (!viewAsRole || !currentUserProfile) return currentUserProfile;
  // Create a simulated profile with the selected role
  return {
    ...currentUserProfile,
    role: viewAsRole,
    // For non-owner roles, restrict to just nnc-iss to simulate typical staff
    restaurants: viewAsRole === 'manager' ? Object.keys(RESTAURANTS) : ['nnc-iss']
  };
}

function onViewAsRole(role) {
  viewAsRole = role;
  document.getElementById('viewAsRole').value = role;
  const banner = document.getElementById('viewAsBanner');
  if (role) {
    banner.style.display = 'flex';
    document.getElementById('viewAsLabel').textContent = ROLES[role]?.label || role;
  } else {
    banner.style.display = 'none';
  }
  // Re-render everything with the simulated role
  renderMain();
}

// ==================== MAIN RENDER ====================
function renderMain() {
  renderQuickStats();
  renderToolTiles();
  // Check for ?open= param (used by back buttons on sub-pages)
  const openParam = new URLSearchParams(window.location.search).get('open');
  if (openParam && RESTAURANTS[openParam]) {
    selectedRestaurant = openParam;
    // Clean URL without reloading
    window.history.replaceState({}, '', window.location.pathname);
  }
  if (selectedRestaurant) {
    document.getElementById('locationsView').style.display = 'none';
    showLocationDetail(selectedRestaurant);
  } else {
    showLocationsView();
  }
}

function renderQuickStats() {
  const profile = getEffectiveProfile();
  const today = new Date();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const activeLocations = Object.keys(RESTAURANTS).filter(k => {
    const r = RESTAURANTS[k];
    return r.status !== 'placeholder' && canAccessRestaurant(k, profile);
  }).length;
  const totalSheets = Object.keys(SHEET_TYPES).filter(k => {
    const s = SHEET_TYPES[k];
    return !s.comingSoon && canAccessSheet(k, profile);
  }).length;

  document.getElementById('quickStats').innerHTML = `
    <div class="quick-stat">
      <div class="label">Today</div>
      <div class="value" style="font-size:1.1rem">${(today.getMonth()+1)}/${today.getDate()}/${today.getFullYear()}</div>
      <div class="sub">${dayNames[today.getDay()]}</div>
    </div>
    <div class="quick-stat">
      <div class="label">Active Locations</div>
      <div class="value">${activeLocations}</div>
      <div class="sub">${Object.keys(RESTAURANTS).length} total</div>
    </div>
    <div class="quick-stat">
      <div class="label">Inventory Sheets</div>
      <div class="value">${totalSheets}</div>
      <div class="sub">across all locations</div>
    </div>
    <div class="quick-stat">
      <div class="label">${viewAsRole ? 'Viewing as' : 'Your Role'}</div>
      <div class="value" style="font-size:1.1rem">${ROLES[profile?.role]?.label||'Staff'}</div>
      <div class="sub">${ROLES[profile?.role]?.description||''}</div>
    </div>
  `;
}

// ==================== LOCATIONS VIEW ====================
function showLocationsView() {
  selectedRestaurant = null;
  document.getElementById('locationsView').style.display = 'block';
  document.getElementById('locationDetail').classList.remove('visible');
  renderLocationCards();
}

function buildLocationCard(key, profile) {
  const loc = RESTAURANTS[key];
  const hasAccess = canAccessRestaurant(key, profile);
  const isPlaceholder = loc.status === 'placeholder';
  const cardClass = (isPlaceholder || !hasAccess) ? 'placeholder' : '';
  const sheets = Object.keys(SHEET_TYPES).filter(sk => {
    const s = SHEET_TYPES[sk];
    return s.restaurants && s.restaurants.includes(key) && !s.comingSoon;
  });
  const comingSoonSheets = Object.keys(SHEET_TYPES).filter(sk => {
    const s = SHEET_TYPES[sk];
    return s.restaurants && s.restaurants.includes(key) && s.comingSoon;
  });
  const allSheets = [...sheets, ...comingSoonSheets].map(sk => SHEET_TYPES[sk]);
  const onclick = (!isPlaceholder && hasAccess) ? `onclick="openLocation('${key}')"` : '';

  return `<div class="location-card ${cardClass}" ${onclick}>
    <div class="location-accent" style="background:${loc.color}"></div>
    <div class="location-header">
      <div class="location-icon" style="background:${loc.color}15">${loc.icon}</div>
      <div class="location-info">
        <h3>${loc.shortName}</h3>
        <div class="loc-desc">${loc.description}</div>
      </div>
    </div>
    <div class="location-body">
      <div class="location-sheets">
        ${allSheets.map(s => `<span class="location-sheet-tag">${s.icon} ${s.name}</span>`).join('')}
      </div>
    </div>
    <div class="location-footer">
      ${isPlaceholder
        ? '<span class="status coming">Coming Soon</span><span></span>'
        : hasAccess
          ? `<span class="status active">${sheets.length} active sheet${sheets.length!==1?'s':''}</span><span class="arrow">→</span>`
          : '<span class="status coming">No Access</span><span></span>'
      }
    </div>
  </div>`;
}

function renderLocationCards() {
  const container = document.getElementById('locationsGrid');
  const profile = getEffectiveProfile();
  const isOwner = profile?.role === 'owner';

  const restaurantKeys = ['nnc-iss', 'nnc-renton', 'babas-bel'];
  const warehouseKeys = ['renton-wh', 'ondemand-renton'];

  // Filter: show locations user has access to, plus placeholders for owners
  const canSee = (key) => {
    if (!RESTAURANTS[key]) return false;
    if (RESTAURANTS[key].status === 'placeholder') return isOwner; // only owners see coming-soon
    return canAccessRestaurant(key, profile);
  };

  let html = '';

  // Restaurants section — only show header if there are visible cards
  const visibleRestaurants = restaurantKeys.filter(canSee);
  if (visibleRestaurants.length) {
    html += `<div style="grid-column:1/-1;margin-bottom:-8px"><div class="section-title" style="font-size:1rem;margin-bottom:0">🍛 Restaurants</div></div>`;
    visibleRestaurants.forEach(key => { html += buildLocationCard(key, profile); });
  }

  // Warehouse & Distribution section
  const visibleWarehouses = warehouseKeys.filter(canSee);
  if (visibleWarehouses.length) {
    html += `<div style="grid-column:1/-1;margin-top:12px;margin-bottom:-8px"><div class="section-title" style="font-size:1rem;margin-bottom:0">🏭 Warehouse & Distribution</div></div>`;
    visibleWarehouses.forEach(key => { html += buildLocationCard(key, profile); });
  }

  container.innerHTML = html;
  renderPrepSection();
  renderCateringsSection();
}

function renderPrepSection() {
  const profile = getEffectiveProfile();
  const container = document.getElementById('prepDataSection');

  // Only show for roles that have prep access
  const prepSheets = Object.keys(SHEET_TYPES).filter(sk => {
    const s = SHEET_TYPES[sk];
    return s.category === 'prep';
  });

  if (prepSheets.length === 0) { container.innerHTML = ''; return; }

  // Get unique locations that have prep sheets
  const prepLocations = [];
  const seen = new Set();
  prepSheets.forEach(sk => {
    const s = SHEET_TYPES[sk];
    (s.restaurants || []).forEach(rk => {
      if (!seen.has(rk) && RESTAURANTS[rk]) {
        seen.add(rk);
        prepLocations.push({ key: rk, sheetKey: sk, ...RESTAURANTS[rk], sheet: s });
      }
    });
  });

  container.innerHTML = `
    <div class="prep-section">
      <h3>🥩 Prep Data <span class="badge" style="background:#fef3c7;color:#92400e;font-size:.72rem;padding:3px 10px;border-radius:12px;font-weight:600">Cost Optimization</span></h3>
      <div class="prep-desc">
        Track meat cutting and prep across all locations — weight, fat content, water content, and wastage to optimize costs and reduce loss.<br>
        <span style="color:var(--gray-400)">Seguimiento del corte y preparación de carne — peso, grasa, agua y desperdicio para optimizar costos.</span>
      </div>
      <div class="prep-locations">
        ${prepLocations.map(loc => `
          <div class="prep-loc-card">
            <div class="prep-icon" style="background:${loc.color}15">${loc.icon}</div>
            <div class="prep-info">
              <div class="name">${loc.shortName}</div>
              <div class="status">${loc.sheet.comingSoon ? 'Coming Soon — Setup in Progress' : 'Active'}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ==================== LOCATION DETAIL VIEW ====================
function showLocationDetail(key) {
  const container = document.getElementById('locationDetail');
  const loc = RESTAURANTS[key];
  const profile = getEffectiveProfile();
  const color = loc.color;

  // Special layout for warehouse
  if (key === 'renton-wh') {
    return showWarehouseDetail(container, loc, color);
  }

  // Special layout for On Demand Renton — go directly to its page
  if (key === 'ondemand-renton') {
    navigateTo('ondemand-renton.html');
    return;
  }

  // Special layout for Issaquah
  if (key === 'nnc-iss') {
    return showIssaquahDetail(container, loc, color);
  }

  // Filter sheets for this location
  const groups = {};
  Object.keys(SHEET_TYPES).forEach(sk => {
    const sheet = SHEET_TYPES[sk];
    if (!sheet.restaurants || !sheet.restaurants.includes(key)) return;
    const accessible = canAccessSheet(sk, profile) && !sheet.comingSoon;
    const obj = { key: sk, ...sheet, accessible };
    const cat = sheet.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(obj);
  });

  const CATEGORY_LABELS = {
    daily: { title: 'Daily Operations', badge: 'AM/PM Tracking' },
    inventory: { title: 'Non Daily Inventory', badge: 'Weekly Inventory' },
    operations: { title: 'Vendor & Operations', badge: 'Live Data' },
    prep: { title: 'Prep Data', badge: 'Cost Optimization' },
    'usage-prep': { title: 'Issaquah Daily Usage and Prep Log', badge: 'Daily Tracking' }
  };

  let sheetsHtml = '';

  Object.keys(CATEGORY_LABELS).forEach(catKey => {
    const sheets = groups[catKey];
    if (!sheets || sheets.length === 0) return;
    const label = CATEGORY_LABELS[catKey];

    sheetsHtml += `<div class="section-title">${label.title} <span class="badge">${label.badge}</span></div>`;
    sheetsHtml += `<div class="sheet-grid">`;
    sheets.forEach(s => {
      const isComingSoon = s.comingSoon;
      const cardClass = (!s.accessible || isComingSoon) ? 'disabled' : '';
      const click = (s.accessible && !isComingSoon) ? `onclick="openSheet('${s.key}')"` : '';

      sheetsHtml += `<div class="sheet-card ${cardClass}" ${click}>
        <div class="accent-bar" style="background:${color}"></div>
        <div class="icon">${s.icon}</div>
        <div class="name">${s.name}</div>
        <div class="desc">${(s.description || '').replace(/\n/g, '<br>')}</div>
        <div class="meta">
          <span class="tag freq">${s.frequency}</span>
          ${isComingSoon
            ? '<span class="tag coming-soon">Coming Soon</span>'
            : s.accessible
              ? '<span class="tag status-ok">Active</span>'
              : '<span class="tag coming-soon">No Access</span>'
          }
        </div>
      </div>`;
    });
    sheetsHtml += `</div>`;
  });

  if (!sheetsHtml) {
    sheetsHtml = '<div style="padding:40px;text-align:center;color:var(--gray-400)">No sheets configured for this location yet.</div>';
  }

  container.innerHTML = `
    <div class="detail-header">
      <h2><span style="font-size:1.5rem">${loc.icon}</span> ${loc.shortName}</h2>
      <button class="back-btn" onclick="showLocationsView()">← Back to All Locations</button>
    </div>
    ${sheetsHtml}
  `;
  container.classList.add('visible');
}

function showIssaquahDetail(container, loc, color) {
  const profile = getEffectiveProfile();

  // Helper: build a tile, returns empty string if no access
  function tile(sheetKey, accentColor, icon, name, desc, freq, extraClick) {
    if (!can(sheetKey)) return '';
    const click = extraClick || `openSheet('${sheetKey}')`;
    return `<div class="sheet-card" onclick="${click}">
      <div class="accent-bar" style="background:${accentColor}"></div>
      <div class="icon">${icon}</div>
      <div class="name">${name}</div>
      <div class="desc">${desc}</div>
      <div class="meta">
        <span class="tag freq">${freq}</span>
        <span class="tag status-ok">Active</span>
      </div>
    </div>`;
  }

  // Helper: render a section only if it has visible tiles
  function section(title, badge, tiles, marginTop) {
    const content = tiles.join('');
    if (!content) return '';
    return `<div class="section-title"${marginTop ? ` style="margin-top:20px"` : ''}>${title} <span class="badge">${badge}</span></div>

    tile('nnc-rice-usage', '#065f46', '🍚', 'Rice Usage Log', 'Daily rice tracking — made, leftover, usage, waste', 'daily'),
    tile('nnc-chicken-prep', '#92400e', '🍗', 'Raw Chicken Processing', 'Cases, bags, weight, fat, water content tracking', 'daily'),
    tile('nnc-tikka-prep', '#dc2626', '🍢', 'Tikka (CTM) Processing', 'Raw, cooked, and cutting stages — dark/white meat tracking', 'daily'),
    tile('nnc-produce-prep', '#15803d', '🧅', 'Produce Prep', 'Onion, potato, paneer processing', 'daily'),
    tile('nnc-weekly-tasks', '#7c3aed', '📝', 'Weekly Tasks', 'Daily prep tasks & items to send to Renton', 'daily')

    tile('nnc-packing-log', '#4338ca', '📦', 'Packing Log', 'Haleem, Keema, Seekh Kabab, Karela, Nehari Sauce', 'daily')

      if (n > 0) { b.style.display = 'inline-block'; b.textContent = n; }
      else { b.style.display = 'none'; }

// ==================== USER MANAGEMENT ====================
let userMgmtVisible = false;

function toggleUserMgmt() {
  userMgmtVisible = !userMgmtVisible;
  const container = document.getElementById('userMgmt');
  if (userMgmtVisible) {
    container.style.display = 'block';
    container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--gray-500)">Loading users...</div>';
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    renderUserMgmt();
  } else {
    container.style.display = 'none';
  }
}

async function renderUserMgmt() {
  const container = document.getElementById('userMgmt');
  let users;
  try {
    users = await getAllUsers();
  } catch (err) {
    container.innerHTML = `<div style="padding:24px;color:var(--danger);font-weight:600">Error loading users: ${err.message}. Check Firestore security rules — the 'users' collection may need read access for authenticated users.</div>`;
    return;
  }
  if (!users || users.length === 0) {
    container.innerHTML = '<div style="padding:24px;color:var(--gray-500)">No users found. Users will appear here after they sign in for the first time.</div>';
    return;
  }

  let html = `<div class="user-mgmt">
    <h3>User Management</h3>

        <th>Email</th>
        <th>Display Name</th>

  users.forEach(u => {
    const isCurrentUser = u.uid === auth.currentUser?.uid;

    ).join('');

          onchange="onRestaurantToggle('${u.uid}',this)">${RESTAURANTS[r].shortName}</label>`
    ).join(' ');

    const lastLogin = u.lastLogin ? (u.lastLogin.toDate ? u.lastLogin.toDate().toLocaleDateString() : new Date(u.lastLogin).toLocaleDateString()) : 'Never';

    html += `<tr>
      <td>${u.email}${isCurrentUser?' <span style="font-size:.7rem;color:var(--primary)">(you)</span>':''}</td>
      <td><input type="text" value="${u.displayName||''}" style="padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem;width:120px"
        onchange="onNameChange('${u.uid}',this.value)"></td>
      <td><select onchange="onRoleChange('${u.uid}',this.value)"${isCurrentUser&&currentUserProfile.role==='owner'?' disabled':''}>${roleOptions}</select></td>
      <td style="display:flex;gap:8px;flex-wrap:wrap">${locChecks}</td>
      <td style="font-size:.8rem;color:var(--gray-400)">${lastLogin}</td>
    </tr>`;
  });

  html += `</tbody></table></div>

    <div style="margin-top:24px;padding:20px;background:var(--gray-50);border-radius:12px;border:1px solid var(--gray-200)">
      <h4 style="margin-bottom:12px;font-size:.95rem">Invite New User</h4>

          <label style="font-size:.75rem;font-weight:600;color:var(--gray-500);display:block;margin-bottom:4px">Role</label>
          <select id="inviteRole" style="padding:8px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:.85rem">
            ${Object.keys(ROLES).filter(r=>r!=='owner').map(r=>`<option value="${r}"${r==='staff'?' selected':''}>${ROLES[r].label}</option>`).join('')}
          </select>
        </div>
        <button onclick="inviteUser()" style="padding:8px 18px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer">Create Account</button>
      </div>
      <div id="inviteStatus" style="font-size:.82rem;margin-top:8px;display:none"></div>
    </div>

    <div style="margin-top:24px;padding:20px;background:var(--gray-50);border-radius:12px;border:1px solid var(--gray-200)">
      <h4 style="margin-bottom:4px;font-size:.95rem">Role Permissions</h4>
      <p style="font-size:.78rem;color:var(--gray-400);margin-bottom:16px">Toggle which pages each role can access. Owner always has full access.</p>
      <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:.78rem">
        <thead><tr>
          <th style="text-align:left;padding:8px 10px;background:var(--gray-100);border-bottom:1px solid var(--gray-200);min-width:180px">Page</th>
          ${Object.keys(ROLES).filter(r=>r!=='owner').map(r=>
            `<th style="text-align:center;padding:8px 6px;background:var(--gray-100);border-bottom:1px solid var(--gray-200);white-space:nowrap">${ROLES[r].label}</th>`
          ).join('')}
        </tr></thead>
        <tbody>
          ${Object.keys(SHEET_TYPES).filter(sk=>!SHEET_TYPES[sk].comingSoon).map(sk => {
            const s = SHEET_TYPES[sk];
            return `<tr>
              <td style="padding:6px 10px;border-bottom:1px solid var(--gray-100);font-weight:600">${s.icon} ${s.name}</td>
              ${Object.keys(ROLES).filter(r=>r!=='owner').map(r => {
                const checked = rolePermissions && rolePermissions[r] ? rolePermissions[r].includes(sk) : (s.allowedRoles||[]).includes(r);
                return `<td style="text-align:center;padding:6px;border-bottom:1px solid var(--gray-100)">
                  <input type="checkbox" ${checked?'checked':''} onchange="toggleSheetRole('${sk}','${r}',this.checked)">
                </td>`;
              }).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>
  </div>`;
  container.innerHTML = html;
}

async function inviteUser() {
  const email = document.getElementById('inviteEmail').value.trim();
  const password = document.getElementById('invitePassword').value;
  const role = document.getElementById('inviteRole').value;
  const status = document.getElementById('inviteStatus');

  if (!email || !password) {
    status.style.display = 'block'; status.style.color = 'var(--danger)';
    status.textContent = 'Email and password are required.';
    return;
  }
  if (password.length < 6) {
    status.style.display = 'block'; status.style.color = 'var(--danger)';
    status.textContent = 'Password must be at least 6 characters.';
    return;
  }

  status.style.display = 'block'; status.style.color = 'var(--gray-500)';
  status.textContent = 'Creating account...';

  // Save current owner credentials so we can re-auth after
  const ownerEmail = auth.currentUser.email;

  try {
    // Create the new user account
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    const newUid = cred.user.uid;

    // Write their profile to Firestore with the selected role
    await db.collection('users').doc(newUid).set({
      email: email,
      displayName: email.split('@')[0],
      role: role,
      restaurants: ['nnc-iss'],
      createdAt: new Date(),
      lastLogin: null,
      invitedBy: ownerEmail
    });

    // Firebase auto-signs in as the new user — sign out and prompt owner to re-login
    await auth.signOut();

    status.style.color = 'var(--success)';
    status.textContent = `Account created for ${email} (${ROLES[role]?.label}). You have been signed out — please sign back in.`;

    // Show login overlay after a brief delay
    setTimeout(() => {
      document.getElementById('loginOverlay').classList.remove('hidden');
    }, 1500);

  } catch (err) {
    status.style.color = 'var(--danger)';
    status.textContent = 'Error: ' + err.message;
  }
}

async function toggleSheetRole(sheetKey, role, enabled) {
  if (!rolePermissions) rolePermissions = {};
  if (!rolePermissions[role]) rolePermissions[role] = [];
  if (enabled && !rolePermissions[role].includes(sheetKey)) {
    rolePermissions[role].push(sheetKey);
  } else if (!enabled) {
    rolePermissions[role] = rolePermissions[role].filter(sk => sk !== sheetKey);
  }
  await saveRolePermissions();
  showToastShared(`${ROLES[role]?.label} access updated`);
}

async function onRoleChange(uid, role) {
  await db.collection('users').doc(uid).update({ role });
  showToastShared('Role updated');
}

async function onNameChange(uid, name) {
  await db.collection('users').doc(uid).update({ displayName: name });
  if (uid === auth.currentUser?.uid) document.getElementById('userInfo').textContent = name;
  showToastShared('Name updated');
}

async function onRestaurantToggle(uid, checkbox) {
  const userDoc = await db.collection('users').doc(uid).get();
  const current = userDoc.data()?.restaurants || [];
  let updated;
  if (checkbox.checked) updated = [...new Set([...current, checkbox.value])];
  else updated = current.filter(r => r !== checkbox.value);
  await db.collection('users').doc(uid).update({ restaurants: updated });
  showToastShared('Location access updated');
}
