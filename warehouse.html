<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renton Warehouse Inventory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --primary: #4338ca; --primary-light: #6366f1; --primary-bg: #eef2ff;
  --danger: #dc2626; --success: #16a34a;
  --amber: #d97706; --amber-bg: #fffbeb;
  --frozen: #0891b2; --frozen-bg: #ecfeff;
  --supply: #059669; --supply-bg: #ecfdf5;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827;
  --radius: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-50);color:var(--gray-900);min-height:100vh}

.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#4338ca,#1e1b4b);display:flex;align-items:center;justify-content:center;z-index:100}
.login-overlay.hidden{display:none}
.login-box{background:#fff;border-radius:16px;padding:40px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{color:var(--primary);margin-bottom:6px;font-size:1.4rem}
.login-box .subtitle{color:var(--gray-500);margin-bottom:24px;font-size:.9rem}
.login-box input{width:100%;padding:12px 16px;border:1px solid var(--gray-300);border-radius:8px;font-size:.95rem;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.login-box button{width:100%;padding:12px;background:var(--primary-light);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer}
.login-box button:hover{background:var(--primary)}
.login-error{background:#fef2f2;color:#991b1b;padding:10px;border-radius:8px;font-size:.85rem;margin-bottom:12px;display:none}

.header{background:linear-gradient(135deg,#4338ca,#1e1b4b);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:1.3rem;font-weight:700}
.header-sub{opacity:.85;font-size:.85rem}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.btn-primary{background:var(--primary-light);color:#fff}
.btn-white{background:#fff;color:var(--gray-700)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}

.date-nav{background:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:16px;border-bottom:1px solid var(--gray-200);flex-wrap:wrap}
.date-nav button{background:var(--gray-100);border:1px solid var(--gray-300);border-radius:var(--radius);padding:6px 14px;cursor:pointer;font-weight:600;font-size:.85rem}
.date-nav button:hover{background:var(--gray-200)}
.date-nav .current-date{font-size:1.15rem;font-weight:700;color:var(--primary);min-width:220px;text-align:center}
.date-nav .day-name{font-size:.85rem;color:var(--gray-500);font-weight:500;text-align:center}

.inventory-person-bar{background:#fff;padding:10px 24px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.inventory-person-bar label{font-size:.85rem;font-weight:600;color:var(--gray-700)}
.inventory-person-bar input{padding:6px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:.9rem;width:250px}
.inventory-person-bar input:focus{outline:none;border-color:var(--primary-light)}

.tab-bar{padding:12px 24px;display:flex;gap:10px;background:#fff;overflow-x:auto;border-bottom:1px solid var(--gray-200);flex-wrap:wrap}
.tab{padding:10px 22px;font-size:.9rem;font-weight:700;color:var(--gray-600);cursor:pointer;white-space:nowrap;transition:all .15s;border-radius:var(--radius);background:var(--gray-100);border:2px solid var(--gray-300)}
.tab:hover{background:var(--primary-bg);border-color:var(--primary-light);color:var(--primary)}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 6px rgba(67,56,202,.3)}
.tab.frozen.active{background:var(--frozen);border-color:var(--frozen)}
.tab.supply.active{background:var(--supply);border-color:var(--supply)}

.filter-bar{padding:12px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-input{padding:8px 14px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:.9rem;width:260px}
.search-input:focus{outline:none;border-color:var(--primary-light)}

.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:16px 24px}
.stat-card{background:#fff;border-radius:var(--radius);padding:14px 18px;border:1px solid var(--gray-200)}
.stat-card .label{font-size:.72rem;color:var(--gray-500);text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.stat-card .value{font-size:1.4rem;font-weight:700;margin-top:2px}
.stat-card .value.warn{color:var(--danger)}

.table-wrap{padding:16px 24px;overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,.06);min-width:700px}
thead th{background:var(--gray-100);padding:6px 8px;text-align:left;font-size:.7rem;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--gray-200);position:sticky;top:0;z-index:5}
thead th:first-child{min-width:200px;position:sticky;left:0;z-index:10;background:var(--gray-100);box-shadow:2px 0 4px rgba(0,0,0,.08)}
tbody td{padding:4px 8px;border-bottom:1px solid var(--gray-100);font-size:.84rem}
tbody td:first-child{position:sticky;left:0;z-index:2;background:#fff;box-shadow:2px 0 4px rgba(0,0,0,.06);font-weight:600}
tbody tr:hover td{background:var(--primary-bg)}
tbody tr:hover td:first-child{background:var(--primary-bg)}
tbody tr.section-header td{background:var(--gray-100);font-weight:700;font-size:.8rem;text-transform:uppercase;color:var(--gray-500);letter-spacing:.5px;padding:8px 14px}
input[type="number"]{width:60px;padding:4px 6px;border:1px solid var(--gray-300);border-radius:6px;font-size:.85rem;text-align:center}
input[type="number"]:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 2px rgba(99,102,241,.15)}
.status-ok{color:var(--success);font-weight:600}
.status-low{color:var(--amber);font-weight:600}
.status-critical{color:var(--danger);font-weight:700}
.note-input{width:120px;padding:4px 6px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem}
.note-input:focus{outline:none;border-color:var(--primary-light)}

/* Settings panel */
.settings-panel{display:none;padding:24px;background:#fff;margin:16px 24px;border-radius:var(--radius);border:1px solid var(--gray-200)}
.settings-panel.visible{display:block}
.settings-panel h3{font-size:1rem;font-weight:700;margin-bottom:16px}
.settings-section{margin-bottom:24px}
.settings-section h4{font-size:.85rem;font-weight:700;color:var(--gray-700);margin-bottom:8px}
.item-edit-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray-100);flex-wrap:wrap}
.item-edit-row input,.item-edit-row select{padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem}

/* Location badge */
.location-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(255,255,255,.2);border-radius:12px;font-size:.78rem;font-weight:600}

/* Transfer modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.visible{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:12px;padding:28px;width:90%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:16px;color:var(--gray-900)}
.modal-field{margin-bottom:16px}
.modal-field label{font-size:.85rem;font-weight:600;color:var(--gray-700);display:block;margin-bottom:6px}
.modal-field .info{font-size:1rem;font-weight:700;color:var(--primary)}
.modal-field input,.modal-field select{width:100%;padding:10px 14px;border:1px solid var(--gray-300);border-radius:8px;font-size:.95rem}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.btn-cancel{padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;background:var(--gray-200);color:var(--gray-700)}
.btn-confirm{padding:10px 20px;border:none;border-radius:8px;font-weight:600;cursor:pointer;background:var(--primary-light);color:#fff}
.btn-confirm:hover{background:var(--primary)}
.btn-transfer{background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-light);border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-transfer:hover{background:var(--primary-light);color:#fff}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:.9rem;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}

@media(max-width:640px){
  .header{padding:12px 16px}
  .header h1{font-size:1.1rem}
  .date-nav{padding:10px 16px;gap:8px}
  .tab-bar{padding:10px 16px}
  .table-wrap{padding:8px}
  .filter-bar{padding:8px 16px}
  .stats-bar{padding:8px 16px}
  input[type="number"]{width:50px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>Renton Warehouse</h2>
    <p class="subtitle">Sign in to access warehouse inventory</p>
    <div class="login-error" id="loginError"></div>
    <input type="email" id="loginEmail" placeholder="Email address">
    <input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')handleLogin()">
    <button id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div>
    <h1 id="pageTitle">🏭 Renton Warehouse</h1>
    <div class="header-sub" id="pageSubtitle">Warehouse Inventory Management</div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost btn-sm" onclick="goToDashboard()">← Dashboard</button>
    <button class="btn btn-ghost btn-sm" id="settingsBtn" onclick="toggleSettings()">⚙️ Settings</button>
    <button class="btn btn-ghost btn-sm" onclick="exportExcel()">📊 Excel</button>
    <button class="btn btn-ghost btn-sm" onclick="exportPDF()">📄 PDF</button>
    <button class="btn btn-success btn-sm" onclick="sendEmailReport()">📧 Email</button>
    <button class="btn btn-ghost btn-sm" onclick="auth.signOut()">Sign Out</button>
  </div>
</div>

<!-- DATE NAV -->
<div class="date-nav">
  <button onclick="changeDay(-1)">← Prev Day</button>
  <div>
    <div class="current-date" id="dateLabel"></div>
    <div class="day-name" id="dateDayName"></div>
  </div>
  <button onclick="changeDay(1)">Next Day →</button>
  <button onclick="goToToday()" class="btn btn-sm btn-primary" style="background:#4338ca;color:#fff;font-weight:800;padding:8px 18px;font-size:.9rem;border-radius:20px;box-shadow:0 2px 8px rgba(67,56,202,.3)">📅 Today</button>
</div>

<!-- INVENTORY PERSON -->
<div class="inventory-person-bar">
  <label>Counted By:</label>
  <input type="text" id="inventoryPerson" placeholder="Enter your name" onchange="saveInventoryPerson(this.value)">
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar"></div>

<!-- SECTION TABS: Frozen / Dry Goods / Supplies -->
<div class="tab-bar" id="tabBar"></div>

<!-- SUB-CATEGORY TABS -->
<div class="tab-bar" id="subTabBar" style="background:var(--gray-50);padding:8px 24px;gap:6px;border-bottom:none"></div>

<!-- FILTER -->
<div class="filter-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="Search items..." oninput="renderTable()">
</div>

<!-- TABLE -->
<div class="table-wrap" id="tableWrap"></div>

<!-- TRANSFER MODAL -->
<!-- UNIFIED TRANSFER MODAL -->
<div class="modal-overlay" id="transferModal">
  <div class="modal">
    <h3 id="transferModalTitle">📤 Transfer</h3>
    <div class="modal-field">
      <label>Item:</label>
      <div class="info" id="transferItemName" style="font-weight:700">—</div>
    </div>
    <div class="modal-field">
      <label id="transferCountLabel">Current Count:</label>
      <div class="info" id="transferCurrentCount">—</div>
    </div>
    <div class="modal-field">
      <label>From:</label>
      <div class="info" id="transferFromName" style="font-size:.85rem;color:var(--gray-700)">Warehouse</div>
    </div>
    <div class="modal-field">
      <label>Quantity to Transfer:</label>
      <input type="number" id="transferQty" min="0" step="0.5" placeholder="0">
    </div>
    <div class="modal-field">
      <label>Destination:</label>
      <select id="transferDest">
        <option value="issaquah">Issaquah - NNC</option>
        <option value="renton">Renton - NNC</option>
        <option value="ondemand-renton">On Demand Renton</option>
        <option value="babas">Baba's Bellevue</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Transfer Date:</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="date" id="transferDate" style="padding:8px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:.9rem;flex:1">
        <button type="button" onclick="document.getElementById('transferDate').value=new Date().toISOString().split('T')[0]" style="padding:6px 10px;background:var(--gray-100);border:1px solid var(--gray-300);border-radius:6px;font-size:.78rem;cursor:pointer;white-space:nowrap">Today</button>
      </div>
    </div>
    <div class="modal-field">
      <label>Authorized By: <span style="color:var(--danger)">*</span></label>
      <input type="text" id="transferAuthorizedBy" placeholder="Name of person authorizing this transfer" style="width:100%;padding:8px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:.9rem">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTransferModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmUnifiedTransfer()">Confirm Transfer</button>
    </div>
  </div>
</div>

<!-- ADD CONTAINER MODAL -->
<div class="modal-overlay" id="addContainerModal">
  <div class="modal" style="max-width:560px">
    <h3>📦 Add New Container</h3>
    <div class="modal-field">
      <label>Date Received:</label>
      <input type="date" id="newContainerDate">
    </div>
    <div class="modal-field">
      <label>Vendor:</label>
      <input type="text" id="newContainerVendor" placeholder="e.g. MAZEDAAR - MULTI FOOD" list="vendorSuggestions">
      <datalist id="vendorSuggestions"></datalist>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:.85rem;font-weight:600;color:var(--gray-700);display:block;margin-bottom:8px">Items:</label>
      <div id="newContainerItems"></div>
      <button onclick="addContainerItemRow()" style="margin-top:8px;padding:6px 14px;background:var(--gray-100);border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--gray-600)">+ Add Item</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddContainerModal()">Cancel</button>
      <button class="btn-confirm" onclick="saveNewContainer()">Save Container</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-panel" id="settingsPanel">
  <h3>⚙️ Warehouse Settings</h3>
  <div class="settings-section">
    <h4>Manage Items (<span id="settingsTabLabel"></span>)</h4>
    <p style="font-size:.82rem;color:var(--gray-500);margin-bottom:12px">Add, edit, or remove items in the current section. Changes are saved automatically.</p>
    <div id="itemEditor"></div>
    <button class="btn btn-primary btn-sm" onclick="addNewItem()" style="margin-top:12px">+ Add Item</button>
  </div>
  <div class="settings-section">
    <h4>Email Settings</h4>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <label style="font-size:.82rem;font-weight:600;min-width:120px">EmailJS Public Key:</label>
      <input type="text" id="emailjsKey" style="flex:1;min-width:200px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem" onchange="saveEmailSettings()">
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <label style="font-size:.82rem;font-weight:600;min-width:120px">Service ID:</label>
      <input type="text" id="emailjsService" style="flex:1;min-width:200px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem" onchange="saveEmailSettings()">
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <label style="font-size:.82rem;font-weight:600;min-width:120px">Template ID:</label>
      <input type="text" id="emailjsTemplate" style="flex:1;min-width:200px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem" onchange="saveEmailSettings()">
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <label style="font-size:.82rem;font-weight:600;min-width:120px">Recipients:</label>
      <input type="text" id="emailRecipients" style="flex:1;min-width:200px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem" placeholder="email1@example.com, email2@example.com" onchange="saveEmailSettings()">
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="shared.js"></script>
<script>
// ==================== WAREHOUSE SECTIONS & SUB-CATEGORIES ====================
const SECTIONS = {
  frozen: {
    name: 'Frozen Inventory',
    icon: '🧊',
    color: '#0891b2',
    tabClass: 'frozen',
    sheetKey: 'wh-frozen',
    subCategories: {
      mazedaar: { name: 'MAZEDAAR - MULTI FOOD', icon: '🥘', color: '#dc2626', receivedDate: '5/2/25' },
      rehmat: { name: 'REHMAT-E-SHEREEN', icon: '🍛', color: '#b45309', receivedDate: '2/6/25' },
      unitedking: { name: 'United King', icon: '❄️', color: '#0891b2', receivedDate: '12/11/24' }
    }
  },
  togo: {
    name: 'To-Go Containers',
    icon: '🥡',
    color: '#b45309',
    tabClass: '',
    sheetKey: 'wh-togo',
    subCategories: {
      renton: { name: 'Renton - NNC', icon: '🏭', color: '#4338ca' },
      issaquah: { name: 'Issaquah - NNC', icon: '🏪', color: '#059669' },
      bellevue: { name: "Baba's Bellevue", icon: '🏬', color: '#7c2d12' }
    }
  },
  supplies: {
    name: 'Supplies',
    icon: '🧤',
    color: '#059669',
    tabClass: 'supply',
    sheetKey: 'wh-supplies',
    subCategories: {
      renton: { name: 'Renton - NNC', icon: '🏭', color: '#4338ca' },
      issaquah: { name: 'Issaquah - NNC', icon: '🏪', color: '#059669' },
      bellevue: { name: "Baba's Bellevue", icon: '🏬', color: '#7c2d12' }
    }
  },
  ingredients: {
    name: 'Ingredients',
    icon: '🫒',
    color: '#dc2626',
    tabClass: '',
    sheetKey: 'wh-ingredients',
    subCategories: {
      renton: { name: 'Renton - NNC', icon: '🏭', color: '#4338ca' },
      issaquah: { name: 'Issaquah - NNC', icon: '🏪', color: '#059669' },
      bellevue: { name: "Baba's Bellevue", icon: '🏬', color: '#7c2d12' }
    }
  },
  catering: {
    name: 'Onsite Catering Supplies',
    icon: '🍽️',
    color: '#4338ca',
    tabClass: '',
    sheetKey: 'wh-catering',
    subCategories: {
      renton: { name: 'Renton - NNC', icon: '🏭', color: '#4338ca' },
      issaquah: { name: 'Issaquah - NNC', icon: '🏪', color: '#059669' },
      bellevue: { name: "Baba's Bellevue", icon: '🏬', color: '#7c2d12' }
    }
  }
};

const UNITS = ['each','case','bag','box','bottle','can','jar','lb','oz','gallon','pack','pallet','roll','sleeve'];

// ==================== STATE ====================
let currentDate = new Date();

// ==================== DATE HELPERS ====================
function dateKey(date) {
  const d = date || currentDate;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(date) {
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${m[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
}
function changeDay(delta) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + delta);
  currentDate.setHours(0,0,0,0);
  render();
}
function goToToday() {
  currentDate = new Date();
  currentDate.setHours(0,0,0,0);
  render();
}

  if (raw) { try { d = JSON.parse(raw); } catch(e) {} }
  if (!d) d = { items: JSON.parse(JSON.stringify(DEFAULT_ITEMS)), weeks: {}, emailjs: {}, emails: '' };
  // Merge preloaded shipment weeks (only if not already saved)
  if (!d.weeks) d.weeks = {};
  Object.keys(PRELOADED_WEEKS).forEach(key => {
    if (!d.weeks[key]) d.weeks[key] = {};
    Object.keys(PRELOADED_WEEKS[key]).forEach(itemId => {
      if (!d.weeks[key][itemId]) d.weeks[key][itemId] = PRELOADED_WEEKS[key][itemId];
    });
  });
  return d;
}
function saveData(d) {
  localStorage.setItem(fsDocId(), JSON.stringify(d));
  saveToFirestore(d);
}
async function saveToFirestore(d) {
  if (!auth.currentUser) return;
  try {
    await db.collection('warehouse_config').doc(fsDocId()).set({
      items: d.items, emailjs: d.emailjs||{}, emails: d.emails||'',
      updatedAt: new Date(), updatedBy: auth.currentUser.email
    },{ merge: true });
  } catch(e) { console.error('FS save error:', e); }
}
async function saveWeekData(wk, section, data) {
  if (!auth.currentUser) return;
  try {
    await db.collection('warehouse_weeks').doc(`${fsDocId()}_${wk}_${section}`).set(data);
  } catch(e) { console.error('FS week save:', e); }
}

function getWeekData(wk, section) {
  const d = loadData();
  const key = `${wk}_${section}`;
  const exact = (d.weeks && d.weeks[key]) || null;
  if (exact && Object.keys(exact).length > 0) return exact;
  // Running total: merge ALL prior dates for this section, newest values win per item
  if (d.weeks) {
    const suffix = '_' + section;
    const allKeys = Object.keys(d.weeks).filter(k => k.endsWith(suffix) && k <= key);
    allKeys.sort(); // oldest first
    if (allKeys.length > 0) {
      const merged = {};
      allKeys.forEach(k => {
        const dateData = d.weeks[k] || {};
        Object.keys(dateData).forEach(itemId => {
          if (!merged[itemId]) merged[itemId] = {};
          Object.assign(merged[itemId], dateData[itemId]);
        });
      });
      return merged;
    }
  }
  return {};
}
function setField(wk, section, itemId, field, val) {
  const d = loadData();
  if (!d.weeks) d.weeks = {};
  const key = `${wk}_${section}`;
  if (!d.weeks[key]) d.weeks[key] = {};
  if (!d.weeks[key][itemId]) d.weeks[key][itemId] = {};
  d.weeks[key][itemId][field] = val;
  saveData(d);
  saveWeekData(wk, section, d.weeks[key]);
}

function setupFirestoreListener() {
  db.collection('warehouse_config').doc(fsDocId()).onSnapshot(snap => {
    if (!snap.exists) return;
    const config = snap.data();
    const d = loadData();
    if (config.items) d.items = config.items;
    if (config.emailjs && config.emailjs.publicKey) d.emailjs = config.emailjs;
    else if (!d.emailjs || !d.emailjs.publicKey) d.emailjs = config.emailjs || d.emailjs || {};
    if (config.emails) d.emails = config.emails;
    localStorage.setItem(fsDocId(), JSON.stringify(d));
    render();
  });
}

function render() {
  updateDateNav();
  renderTabs();
  const isNonFrozenSub = ['allnonfrozen','togo','supplies','ingredients','catering'].includes(activeSection);
  if (activeSection === 'transfers' || activeSection === 'containers' || activeSection === 'ondemand' || isNonFrozenSub) {
    document.getElementById('statsBar').innerHTML = '';
    document.getElementById('subTabBar').innerHTML = '';
    document.getElementById('searchInput').parentElement.style.display = 'none';
    document.querySelector('.inventory-person-bar').style.display = 'none';
    if (activeSection === 'transfers') renderTransfersTab();
    else if (activeSection === 'containers') renderContainersTab();

  } else {

    document.querySelector('.inventory-person-bar').style.display = '';
    document.getElementById('subTabBar').innerHTML = '';

function updateDateNav() {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dateLabel').textContent = formatDate(currentDate);
  document.getElementById('dateDayName').textContent = days[currentDate.getDay()];
}

function renderStats() {
  const d = loadData();
  const sectionItems = (d.items && d.items[activeSection]) || [];
  const wk = dateKey();
  const weekData = getWeekData(wk, activeSection);
  let counted = 0, total = sectionItems.length;
  sectionItems.forEach(item => {
    const data = weekData[item.id] || {};
    if (data.count !== undefined && data.count !== '') counted++;
  });

  let statsHtml = `
    <div class="stat-card"><div class="label">Section</div><div class="value" style="font-size:1.1rem">${SECTIONS[activeSection].icon} ${SECTIONS[activeSection].name}</div></div>
    <div class="stat-card"><div class="label">Total Items</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">Counted</div><div class="value">${counted} / ${total}</div></div>
    <div class="stat-card"><div class="label">Progress</div><div class="value">${total>0?Math.round(counted/total*100):0}%</div></div>`;

  // For frozen: add transfer summary stats
  if (activeSection === 'frozen') {
    const summary = computeFrozenTransferSummary();
    let totalReceived = 0, totalOut = 0, totalRemaining = 0;
    sectionItems.forEach(item => {
      const data = weekData[item.id] || {};
      const count = data.count !== undefined && data.count !== '' ? Number(data.count) : 0;
      const transferred = summary[item.name] ? summary[item.name].whToOD : 0;
      totalReceived += count;
      totalOut += transferred;
      totalRemaining += (count - transferred);
    });
    statsHtml += `
      <div class="stat-card"><div class="label">Total Received</div><div class="value">${totalReceived}</div></div>
      <div class="stat-card"><div class="label">Total Transferred</div><div class="value warn">${totalOut}</div></div>
      <div class="stat-card"><div class="label">WH Remaining</div><div class="value" style="color:var(--success)">${totalRemaining}</div></div>`;
  }

  document.getElementById('statsBar').innerHTML = statsHtml;
}

    const vendorInfo = cat.receivedDate ? ` <span style="font-size:.72rem;color:var(--gray-500);font-weight:500;text-transform:none;letter-spacing:0">(Received ${cat.receivedDate})</span>` : '';
    html += `<tr class="section-header"><td colspan="${colSpan}" style="border-left:4px solid ${cat.color}">${cat.icon} ${cat.name}${vendorInfo}</td></tr>`;

      html += `<tr>
        <td>${item.name}</td>
        <td><input type="text" class="note-input" value="${item.itemNumber||''}" placeholder="—" style="width:80px"
          onchange="updateItemField('${item.id}','itemNumber',this.value)"></td>
        <td><input type="text" class="note-input" value="${item.batchNumber||''}" placeholder="—" style="width:80px"

  }

  container.innerHTML = headerHtml + html;
}

// ==================== FROZEN TRANSFER SUMMARY ====================
function computeFrozenTransferSummary() {
  // Build per-item summary of all transfer flows
  const summary = {}; // itemName => { whToOD, odToRenton, odToIssaquah, odToBabas }

  cachedTransfers.forEach(t => {
    if (t.status === 'rejected') return; // skip rejected
    const name = t.itemName;
    if (!name) return;
    if (!summary[name]) summary[name] = { whToOD: 0, odToRenton: 0, odToIssaquah: 0, odToBabas: 0 };

    if (t.from === 'warehouse' && t.to === 'ondemand-renton') {
      summary[name].whToOD += (t.quantity || 0);
    }
    if (t.from === 'ondemand-renton' && t.to === 'renton') {
      summary[name].odToRenton += (t.quantity || 0);
    }
    if (t.from === 'ondemand-renton' && t.to === 'issaquah') {
      summary[name].odToIssaquah += (t.quantity || 0);
    }
    if (t.from === 'ondemand-renton' && t.to === 'babas') {
      summary[name].odToBabas += (t.quantity || 0);
    }
  });

  // Derive computed fields
  Object.keys(summary).forEach(name => {
    const s = summary[name];
    s.odHolding = s.whToOD - s.odToRenton - s.odToIssaquah - s.odToBabas;
    s.totalDistributed = s.odToRenton + s.odToIssaquah + s.odToBabas;
    // Validation: odHolding + distributed should equal whToOD
    s.checkPasses = Math.abs(s.odHolding + s.totalDistributed - s.whToOD) < 0.01;
  });

  return summary;
}

function updateItem(idx, field, val) {
  const d = loadData();
  if (!d.items) d.items = {};
  if (!d.items[activeSection]) d.items[activeSection] = [];
  if (d.items[activeSection][idx]) {
    d.items[activeSection][idx][field] = val;
    if (field === 'name') {
      d.items[activeSection][idx].id = val.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    }
    saveData(d);
  }
  render();
}
function updateItemInSection(secKey, idx, field, val) {
  const d = loadData();
  if (!d.items) d.items = {};
  if (!d.items[secKey]) d.items[secKey] = [];
  if (d.items[secKey][idx]) {
    d.items[secKey][idx][field] = val;
    if (field === 'name') {
      d.items[secKey][idx].id = val.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');

function exportExcel() {

// ==================== UNIFIED TRANSFER SYSTEM ====================
const DEST_NAMES = { issaquah: 'Issaquah - NNC', renton: 'Renton - NNC', 'ondemand-renton': 'On Demand Renton', babas: "Baba's Bellevue", warehouse: 'Warehouse' };
const FROM_NAMES = { warehouse: 'Warehouse', 'ondemand-renton': 'On Demand Renton' };

function openTransferModal(itemId, itemName, currentCount, fromSource, section) {
  // fromSource: 'warehouse' | 'ondemand-renton'
  // section: which inventory section (frozen, togo, supplies, etc.) — null for on-demand
  transferModalItem = { itemId, itemName, currentCount, fromSource: fromSource || 'warehouse', section: section || activeSection };
  document.getElementById('transferModalTitle').textContent = (fromSource === 'ondemand-renton' ? '⚡' : '📤') + ' Transfer';
  document.getElementById('transferItemName').textContent = itemName;
  document.getElementById('transferCurrentCount').textContent = currentCount;
  document.getElementById('transferCountLabel').textContent = fromSource === 'ondemand-renton' ? 'On Hand:' : 'Current Count:';
  document.getElementById('transferFromName').textContent = FROM_NAMES[fromSource || 'warehouse'] || 'Warehouse';
  document.getElementById('transferQty').value = '';
  document.getElementById('transferDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('transferAuthorizedBy').value = '';
  document.getElementById('transferDest').value = 'issaquah';

  // Show/hide On Demand option based on source
  const destSelect = document.getElementById('transferDest');
  const odOption = destSelect.querySelector('option[value="ondemand-renton"]');
  if (fromSource === 'ondemand-renton') {
    odOption.style.display = 'none';
  } else {
    odOption.style.display = '';
  }

  document.getElementById('transferModal').classList.add('visible');
}

function closeTransferModal() {
  document.getElementById('transferModal').classList.remove('visible');
  transferModalItem = null;
}

async function confirmUnifiedTransfer() {
  if (!transferModalItem) return;
  const qty = Number(document.getElementById('transferQty').value || 0);
  if (qty <= 0) { showToast('Enter a quantity to transfer'); return; }
  if (qty > transferModalItem.currentCount) { showToast('Cannot transfer more than available'); return; }

  const authorizedBy = document.getElementById('transferAuthorizedBy').value.trim();
  if (!authorizedBy) { showToast('Authorized By is required'); return; }

  const transferDateVal = document.getElementById('transferDate').value;
  if (!transferDateVal) { showToast('Please select a transfer date'); return; }

  // Parse the selected date for display and timestamp
  const transferDateObj = new Date(transferDateVal + 'T12:00:00');
  const transferDateDisplay = transferDateObj.toLocaleDateString();

  const dest = document.getElementById('transferDest').value;
  const fromSource = transferModalItem.fromSource;

  // Deduct from source count (only for non-frozen warehouse sections)
  // Frozen section: counts are deducted automatically via transfer log (Received - Transferred Out)
  if (fromSource === 'warehouse' && transferModalItem.itemId && transferModalItem.section && transferModalItem.section !== 'frozen') {
    const wk = dateKey();
    const newCount = transferModalItem.currentCount - qty;
    setField(wk, transferModalItem.section, transferModalItem.itemId, 'count', newCount);
  }

  // Log to Firestore with pending status
  if (auth.currentUser) {
    try {
      await db.collection('warehouse_transfers').add({
        itemId: transferModalItem.itemId || null,
        itemName: transferModalItem.itemName,
        quantity: qty,
        from: fromSource,
        fromName: FROM_NAMES[fromSource] || fromSource,
        to: dest,
        toName: DEST_NAMES[dest] || dest,
        section: transferModalItem.section || 'frozen',
        status: 'pending',
        authorizedBy: authorizedBy,
        date: transferDateDisplay,
        transferDate: transferDateVal,
        timestamp: transferDateObj,
        createdAt: new Date(),
        transferredBy: auth.currentUser.email
      });

      // Send email notification
      sendTransferNotification({
        itemName: transferModalItem.itemName,
        quantity: qty,
        from: FROM_NAMES[fromSource] || fromSource,
        to: DEST_NAMES[dest] || dest,
        authorizedBy: authorizedBy,
        transferredBy: auth.currentUser.email,
        date: transferDateDisplay
      });

    } catch(e) { console.error('Transfer save error:', e); }
  }

  showToast(`Transfer pending: ${qty} × ${transferModalItem.itemName} → ${DEST_NAMES[dest]}`);
  closeTransferModal();
  render();
}

function saveNewContainer() {
  var dateVal = document.getElementById('newContainerDate').value;
  var vendorVal = document.getElementById('newContainerVendor').value.trim();

  if (!dateVal) { showToast('Please enter a date received'); return; }
  if (!vendorVal) { showToast('Please enter a vendor name'); return; }

  var rows = document.getElementById('newContainerItems').children;
  var items = [];
  for (var r = 0; r < rows.length; r++) {
    var nameInput = rows[r].querySelector('[data-field="name"]');
    var qtyInput = rows[r].querySelector('[data-field="qty"]');
    var cpuInput = rows[r].querySelector('[data-field="costPerUnit"]');
    var name = nameInput ? nameInput.value.trim() : '';
    var qty = qtyInput ? Number(qtyInput.value) : 0;
    var cpu = cpuInput ? cpuInput.value.trim() : '';
    if (name && qty > 0) {
      items.push({ name: name, qty: qty, costPerUnit: cpu || '' });
    }
  }

  if (items.length === 0) { showToast('Add at least one item with a name and quantity'); return; }

  // Add to SHIPMENTS array
  SHIPMENTS.push({ date: dateVal, vendor: vendorVal, items: items });

  // Also add items to frozen DEFAULT_ITEMS if they don't exist
  var d = loadData();
  if (!d.items) d.items = {};
  if (!d.items.frozen) d.items.frozen = [];
  var existingIds = d.items.frozen.map(function(fi) { return fi.id; });

  // Determine subCategory key for this vendor
  var subCatKey = vendorVal.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').substring(0, 20);
  // Add vendor subCategory if it doesn't exist
  if (!SECTIONS.frozen.subCategories[subCatKey]) {
    SECTIONS.frozen.subCategories[subCatKey] = { name: vendorVal, icon: '📦', color: '#6b7280', receivedDate: new Date(dateVal).toLocaleDateString('en-US', { month: 'numeric', day: 'numeric', year: '2-digit' }) };
  }

  for (var ni = 0; ni < items.length; ni++) {
    var itemId = items[ni].name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    if (existingIds.indexOf(itemId) === -1) {
      d.items.frozen.push({
        id: itemId, name: items[ni].name, subCategory: subCatKey,
        unit: 'case', par: 0, itemNumber: '', batchNumber: '',
        vendor: vendorVal, receivedDate: dateVal
      });
      existingIds.push(itemId);
    }
  }

  // Preload the week data with received quantities
  var containerDateObj = new Date(dateVal);
  var wk = containerDateObj.getFullYear() + '-' + String(containerDateObj.getMonth()+1).padStart(2,'0') + '-' + String(containerDateObj.getDate()).padStart(2,'0');
  var dateDataKey = wk + '_frozen';
  if (!d.weeks) d.weeks = {};
  if (!d.weeks[dateDataKey]) d.weeks[dateDataKey] = {};
  for (var pi = 0; pi < items.length; pi++) {
    var pId = items[pi].name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    if (!d.weeks[dateDataKey][pId]) d.weeks[dateDataKey][pId] = { count: items[pi].qty };
  }

  saveData(d);

  // Auto-expand the new shipment
  expandedShipments[SHIPMENTS.length - 1] = true;

  showToast('Container added: ' + items.length + ' items from ' + vendorVal);
  closeAddContainerModal();
  renderContainersTab();
}

function renderContainersTab() {
  var container = document.getElementById('tableWrap');
  var savedData = loadData();
  var frozenItems = (savedData.items && savedData.items.frozen) || [];

  // Build unique vendor/date lists
  var vendors = [], dates = [];
  for (var vi = 0; vi < SHIPMENTS.length; vi++) {
    if (vendors.indexOf(SHIPMENTS[vi].vendor) === -1) vendors.push(SHIPMENTS[vi].vendor);
    if (dates.indexOf(SHIPMENTS[vi].date) === -1) dates.push(SHIPMENTS[vi].date);
  }
  dates.sort().reverse();

  // Filter
  var filtered = [];
  for (var fi2 = 0; fi2 < SHIPMENTS.length; fi2++) {
    var sh = SHIPMENTS[fi2];
    if (containerFilterVendor !== 'all' && sh.vendor !== containerFilterVendor) continue;
    if (containerFilterDate !== 'all' && sh.date !== containerFilterDate) continue;
    filtered.push({ shipment: sh, origIndex: fi2 });
  }

  // Sort
  filtered.sort(function(a, b) {
    var sa = a.shipment, sb = b.shipment;
    switch (containerSort) {
      case 'date-desc': return new Date(sb.date) - new Date(sa.date);
      case 'date-asc': return new Date(sa.date) - new Date(sb.date);
      case 'vendor-az': return sa.vendor.localeCompare(sb.vendor);
      case 'vendor-za': return sb.vendor.localeCompare(sa.vendor);
      case 'qty-desc': return sb.items.reduce(function(s,i){return s+i.qty},0) - sa.items.reduce(function(s,i){return s+i.qty},0);
      case 'qty-asc': return sa.items.reduce(function(s,i){return s+i.qty},0) - sb.items.reduce(function(s,i){return s+i.qty},0);
      default: return 0;
    }
  });

  var totalCases = filtered.reduce(function(sum, f) { return sum + f.shipment.items.reduce(function(s2, i) { return s2 + i.qty; }, 0); }, 0);

  var html = '<div style="padding:8px 0">';

  // Vendor filter

  html += '<label style="font-size:.78rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.3px">Vendor:</label>';

    html += '<option value="' + dates[dd] + '"' + (containerFilterDate === dates[dd] ? ' selected' : '') + '>' + dLabel + '</option>';

    var shipCases = ship.items.reduce(function(sum, i) { return sum + i.qty; }, 0);

    html += '<div onclick="toggleShipment(' + origIdx + ')" style="cursor:pointer;padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;transition:background .15s;';

    html += '<div style="font-size:1.3rem;font-weight:800;color:var(--primary)">' + shipCases.toLocaleString() + '</div>';

    html += '<div style="font-size:.68rem;color:var(--gray-400);text-transform:uppercase;font-weight:600;letter-spacing:.5px">Items</div>';
    html += '<div style="font-size:1.05rem;font-weight:700;color:var(--gray-600)">' + ship.items.length + '</div>';

      html += '<div style="padding:16px 20px">';
      html += '<table><thead><tr><th>Item</th><th>Cases Received</th><th>Cost Per Unit</th><th>Item #</th><th>Batch #</th></tr></thead><tbody>';

        html += '</tr>';

      html += '</tbody></table></div>';
    }

    html += '</div>'; // end card
  }

  html += '</div>';
  container.innerHTML = html;

// ==================== ON DEMAND RENTON TAB ====================
function renderOnDemandTab() {
  const container = document.getElementById('tableWrap');
  const destNames = { issaquah: 'Issaquah - NNC', renton: 'Renton - NNC', 'ondemand-renton': 'On Demand Renton', babas: "Baba's Bellevue" };

  // Build net stock: transfers IN (to ondemand-renton) minus transfers OUT (from ondemand-renton)
  const stock = {}; // itemName => { qty, lastDate, transfers: [] }
  cachedTransfers.forEach(t => {
    if (t.to === 'ondemand-renton') {
      if (!stock[t.itemName]) stock[t.itemName] = { qty: 0, lastDate: null, transfers: [] };
      stock[t.itemName].qty += (t.quantity || 0);
      stock[t.itemName].transfers.push(t);
      if (!stock[t.itemName].lastDate || (t.timestamp && t.timestamp.toDate && t.timestamp.toDate() > stock[t.itemName].lastDate)) {
        stock[t.itemName].lastDate = t.timestamp && t.timestamp.toDate ? t.timestamp.toDate() : null;
      }
    }
    if (t.from === 'ondemand-renton') {
      if (!stock[t.itemName]) stock[t.itemName] = { qty: 0, lastDate: null, transfers: [] };
      stock[t.itemName].qty -= (t.quantity || 0);
      stock[t.itemName].transfers.push(t);
    }
  });

  const items = Object.entries(stock).filter(([,v]) => v.qty > 0).sort((a,b) => a[0].localeCompare(b[0]));
  const totalItems = items.length;
  const totalQty = items.reduce((sum,[,v]) => sum + v.qty, 0);

  let html = `<div style="padding:8px 0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div>
        <h3 style="font-size:1.1rem;font-weight:700;color:#9333ea">⚡ On Demand Renton — Current Stock</h3>
        <p style="font-size:.82rem;color:var(--gray-500);margin-top:4px">Rapid-access buffer stock held at Renton for immediate restaurant needs. Quantities are calculated from transfer history.</p>
      </div>
    </div>`;

  // Stats
  html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px">
    <div class="stat-card"><div class="label">Unique Items</div><div class="value">${totalItems}</div></div>
    <div class="stat-card"><div class="label">Total Units</div><div class="value">${totalQty}</div></div>
  </div>`;

  if (items.length === 0) {
    html += `<div style="text-align:center;padding:48px 24px;color:var(--gray-400)">
      <div style="font-size:2rem;margin-bottom:8px">⚡</div>
      <div style="font-size:.95rem;font-weight:600;margin-bottom:4px">No on-demand stock</div>
      <div style="font-size:.85rem">Transfer items from Frozen Inventory using "→ Transfer" and select "On Demand Renton" as the destination</div>
    </div>`;
  } else {
    html += `<table><thead><tr>
      <th>Item</th><th style="text-align:center">Qty on Hand</th><th>Last Received</th><th>Transfer History</th><th>Transfer Out</th>
    </tr></thead><tbody>`;

    items.forEach(([name, data]) => {
      const escapedName = name.replace(/'/g, "\\'");
      const lastDate = data.lastDate ? data.lastDate.toLocaleDateString() : '—';
      const inCount = data.transfers.filter(t => t.to === 'ondemand-renton').length;
      const outCount = data.transfers.filter(t => t.from === 'ondemand-renton').length;
      html += `<tr>
        <td style="font-weight:600">${name}</td>
        <td style="text-align:center;font-weight:700;color:#9333ea;font-size:1.05rem">${data.qty}</td>
        <td style="font-size:.82rem;white-space:nowrap">${lastDate}</td>
        <td style="font-size:.78rem;color:var(--gray-500)">${inCount} in${outCount > 0 ? ', ' + outCount + ' out' : ''}</td>
        <td><button class="btn-transfer" onclick="openTransferModal(null,'${escapedName}',${data.qty},'ondemand-renton',null)">→ Send</button></td>
      </tr>`;
    });

    html += `</tbody></table>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

      <tr><td style="padding:8px 12px;background:#f3f4f6;font-weight:600;border:1px solid #e5e7eb">Quantity</td>
          <td style="padding:8px 12px;border:1px solid #e5e7eb;font-weight:700;color:#dc2626">${details.quantity}</td></tr>
      <tr><td style="padding:8px 12px;background:#f3f4f6;font-weight:600;border:1px solid #e5e7eb">From</td>
          <td style="padding:8px 12px;border:1px solid #e5e7eb">${details.from}</td></tr>
      <tr><td style="padding:8px 12px;background:#f3f4f6;font-weight:600;border:1px solid #e5e7eb">To</td>
          <td style="padding:8px 12px;border:1px solid #e5e7eb">${details.to}</td></tr>
      <tr><td style="padding:8px 12px;background:#f3f4f6;font-weight:600;border:1px solid #e5e7eb">Authorized By</td>
          <td style="padding:8px 12px;border:1px solid #e5e7eb">${details.authorizedBy}</td></tr>
      <tr><td style="padding:8px 12px;background:#f3f4f6;font-weight:600;border:1px solid #e5e7eb">Transferred By</td>
          <td style="padding:8px 12px;border:1px solid #e5e7eb">${details.transferredBy}</td></tr>
      <tr><td style="padding:8px 12px;background:#f3f4f6;font-weight:600;border:1px solid #e5e7eb">Date</td>
          <td style="padding:8px 12px;border:1px solid #e5e7eb">${details.date}</td></tr>
      <tr><td style="padding:8px 12px;background:#f3f4f6;font-weight:600;border:1px solid #e5e7eb">Status</td>
          <td style="padding:8px 12px;border:1px solid #e5e7eb;color:#d97706;font-weight:700">⏳ PENDING ACCEPTANCE</td></tr>
    </table>
    <p style="margin-top:16px;font-size:13px;color:#6b7280">This transfer requires acceptance at the receiving location. Please log in to the inventory system to accept this transfer.</p>
  `;

  try {
    emailjs.init(d.emailjs.publicKey);
    await emailjs.send(d.emailjs.serviceId, d.emailjs.templateId, {
      to_email: d.emails,
      subject: `Transfer Alert: ${details.quantity} × ${details.itemName} → ${details.to}`,
      message_html: bodyHtml,
      message: `Transfer: ${details.quantity} x ${details.itemName} from ${details.from} to ${details.to}. Authorized by: ${details.authorizedBy}. Status: PENDING ACCEPTANCE.`
    });
    console.log('Transfer notification sent');
  } catch(e) {
    console.error('Transfer notification failed:', e);
  }
}

// ==================== TRANSFER ACCEPTANCE ====================
async function acceptTransfer(transferId) {
  try {
    await db.collection('warehouse_transfers').doc(transferId).update({
      status: 'accepted',
      acceptedAt: new Date(),
      acceptedBy: auth.currentUser ? auth.currentUser.email : 'unknown'
    });
    showToast('Transfer accepted — inventory updated');
    render();
  } catch(e) {
    console.error('Accept transfer error:', e);
    showToast('Error accepting transfer');
  }
}

async function rejectTransfer(transferId) {
  try {
    await db.collection('warehouse_transfers').doc(transferId).update({
      status: 'rejected',
      rejectedAt: new Date(),
      rejectedBy: auth.currentUser ? auth.currentUser.email : 'unknown'
    });
    showToast('Transfer rejected');
    render();
  } catch(e) {
    console.error('Reject transfer error:', e);
    showToast('Error rejecting transfer');
  }
}

function setupTransfersListener() {
  db.collection('warehouse_transfers').orderBy('timestamp', 'desc').limit(200).onSnapshot(snap => {
    cachedTransfers = [];
    snap.forEach(doc => { cachedTransfers.push({ ...doc.data(), _id: doc.id }); });
    if (activeSection === 'transfers') renderTransfersTab();
    if (activeSection === 'ondemand') renderOnDemandTab();
    if (activeSection === 'frozen') render();
  });
}

function setTransferFilter(field, value) {
  if (field === 'item') transferFilterItem = value;
  else if (field === 'from') transferFilterFrom = value;
  else if (field === 'to') transferFilterTo = value;
  else if (field === 'status') transferFilterStatus = value;
  else if (field === 'dateFrom') transferFilterDateFrom = value;
  else if (field === 'dateTo') transferFilterDateTo = value;
  else if (field === 'search') transferSearchText = value;
  renderTransfersTab();
}
function setTransferSort(value) {
  transferSort = value;
  renderTransfersTab();
}
function clearTransferFilters() {
  transferFilterItem = 'all';
  transferFilterFrom = 'all';
  transferFilterTo = 'all';
  transferFilterStatus = 'all';
  transferFilterDateFrom = '';
  transferFilterDateTo = '';
  transferSearchText = '';
  transferSort = 'date-desc';
  renderTransfersTab();
}

function getTransferSortDate(t) {
  if (t.timestamp && t.timestamp.toDate) return t.timestamp.toDate().getTime();
  if (t.transferDate) return new Date(t.transferDate + 'T12:00:00').getTime();
  return 0;
}

function applyTransferFilters(list) {
  let filtered = list;

  if (transferSearchText) {
    const s = transferSearchText.toLowerCase();
    filtered = filtered.filter(t =>
      (t.itemName || '').toLowerCase().includes(s) ||
      (t.authorizedBy || '').toLowerCase().includes(s) ||
      (t.date || '').toLowerCase().includes(s)
    );
  }
  if (transferFilterItem !== 'all') {
    filtered = filtered.filter(t => t.itemName === transferFilterItem);
  }
  if (transferFilterFrom !== 'all') {
    filtered = filtered.filter(t => t.from === transferFilterFrom);
  }
  if (transferFilterTo !== 'all') {
    filtered = filtered.filter(t => t.to === transferFilterTo);
  }
  if (transferFilterStatus !== 'all') {
    filtered = filtered.filter(t => t.status === transferFilterStatus);
  }
  if (transferFilterDateFrom) {
    filtered = filtered.filter(t => {
      const d = t.transferDate || t.date || '';
      return d >= transferFilterDateFrom;
    });
  }
  if (transferFilterDateTo) {
    filtered = filtered.filter(t => {
      const d = t.transferDate || t.date || '';
      return d <= transferFilterDateTo;
    });
  }

  // Sort
  filtered.sort((a, b) => {
    switch (transferSort) {
      case 'date-asc': return getTransferSortDate(a) - getTransferSortDate(b);
      case 'date-desc': return getTransferSortDate(b) - getTransferSortDate(a);
      case 'item-az': return (a.itemName || '').localeCompare(b.itemName || '');
      case 'item-za': return (b.itemName || '').localeCompare(a.itemName || '');
      case 'qty-desc': return (b.quantity || 0) - (a.quantity || 0);
      case 'qty-asc': return (a.quantity || 0) - (b.quantity || 0);
      default: return getTransferSortDate(b) - getTransferSortDate(a);
    }
  });

  return filtered;
}

function renderTransfersTab() {
  const container = document.getElementById('tableWrap');
  const transfers = cachedTransfers;

  const pending = transfers.filter(t => t.status === 'pending');
  const completed = transfers.filter(t => t.status !== 'pending');

  // Build unique values for filter dropdowns
  const uniqueItems = [...new Set(transfers.map(t => t.itemName).filter(Boolean))].sort();
  const uniqueFrom = [...new Set(transfers.map(t => t.from).filter(Boolean))];
  const uniqueTo = [...new Set(transfers.map(t => t.to).filter(Boolean))];

  const fromLabels = { warehouse: 'Warehouse', 'ondemand-renton': 'On Demand Renton' };
  const toLabels = { issaquah: 'Issaquah - NNC', renton: 'Renton - NNC', 'ondemand-renton': 'On Demand Renton', babas: "Baba's Bellevue" };

  const hasActiveFilter = transferFilterItem !== 'all' || transferFilterFrom !== 'all' || transferFilterTo !== 'all' || transferFilterStatus !== 'all' || transferFilterDateFrom || transferFilterDateTo || transferSearchText;

  let html = `<div style="padding:8px 0">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="font-size:1.1rem;font-weight:700;color:var(--gray-900)">📤 Transfer History</h3>
      <span style="font-size:.82rem;color:var(--gray-500)">${transfers.length} total · ${pending.length} pending</span>
    </div>`;

  if (transfers.length === 0) {
    html += `<div style="text-align:center;padding:48px 24px;color:var(--gray-400)">
      <div style="font-size:2rem;margin-bottom:8px">📤</div>
      <div style="font-size:.95rem;font-weight:600;margin-bottom:4px">No transfers yet</div>
      <div style="font-size:.85rem">Use the "→ Transfer" button on any item to log when items move to a restaurant</div>
    </div>`;
  } else {
    // Pending transfers section (always shown unfiltered)
    if (pending.length > 0) {
      html += `<div style="margin-bottom:20px;padding:12px;background:#fffbeb;border:1px solid #f59e0b;border-radius:var(--radius)">
        <h4 style="font-size:.92rem;font-weight:700;color:#92400e;margin-bottom:10px">⏳ Pending Transfers (${pending.length})</h4>
        <table><thead><tr>
          <th>Date</th><th>Item</th><th>Qty</th><th>From</th><th>To</th><th>Authorized By</th><th>Actions</th>
        </tr></thead><tbody>`;
      pending.forEach(t => {
        html += `<tr style="background:#fffbeb">
          <td style="white-space:nowrap">${t.date || '—'}</td>
          <td style="font-weight:600">${t.itemName || '—'}</td>
          <td style="text-align:center;font-weight:700;color:var(--danger)">${t.quantity || 0}</td>
          <td style="font-size:.82rem">${t.fromName || (t.from === 'ondemand-renton' ? 'On Demand Renton' : 'Warehouse')}</td>
          <td style="font-size:.82rem">${t.toName || DEST_NAMES[t.to] || t.to || '—'}</td>
          <td style="font-size:.82rem;font-weight:600">${t.authorizedBy || '—'}</td>
          <td>
            <button class="btn btn-success btn-sm" onclick="acceptTransfer('${t._id}')" style="margin-right:4px">Accept</button>
            <button class="btn btn-danger btn-sm" onclick="rejectTransfer('${t._id}')">Reject</button>
          </td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    }

    // ===== FILTER BAR =====
    const selStyle = 'padding:6px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem;background:#fff;cursor:pointer';
    const inputStyle = 'padding:6px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:.82rem;width:130px';

    html += `<div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:.85rem;font-weight:700;color:var(--gray-700)">🔍 Filter & Sort</span>
        ${hasActiveFilter ? '<button onclick="clearTransferFilters()" style="padding:4px 12px;background:var(--danger);color:#fff;border:none;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer">Clear All</button>' : ''}
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end">
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">Search</div>
          <input type="text" placeholder="Item, name, date..." value="${transferSearchText}" oninput="setTransferFilter('search',this.value)" style="${inputStyle};width:160px">
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">Item</div>
          <select onchange="setTransferFilter('item',this.value)" style="${selStyle}">
            <option value="all">All Items</option>
            ${uniqueItems.map(i => `<option value="${i}" ${transferFilterItem===i?'selected':''}>${i}</option>`).join('')}
          </select>
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">From</div>
          <select onchange="setTransferFilter('from',this.value)" style="${selStyle}">
            <option value="all">All Sources</option>
            ${uniqueFrom.map(f => `<option value="${f}" ${transferFilterFrom===f?'selected':''}>${fromLabels[f]||f}</option>`).join('')}
          </select>
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">To</div>
          <select onchange="setTransferFilter('to',this.value)" style="${selStyle}">
            <option value="all">All Destinations</option>
            ${uniqueTo.map(t => `<option value="${t}" ${transferFilterTo===t?'selected':''}>${toLabels[t]||t}</option>`).join('')}
          </select>
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">Status</div>
          <select onchange="setTransferFilter('status',this.value)" style="${selStyle}">
            <option value="all">All</option>
            <option value="accepted" ${transferFilterStatus==='accepted'?'selected':''}>Accepted</option>
            <option value="rejected" ${transferFilterStatus==='rejected'?'selected':''}>Rejected</option>
            <option value="pending" ${transferFilterStatus==='pending'?'selected':''}>Pending</option>
          </select>
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">From Date</div>
          <input type="date" value="${transferFilterDateFrom}" onchange="setTransferFilter('dateFrom',this.value)" style="${inputStyle}">
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">To Date</div>
          <input type="date" value="${transferFilterDateTo}" onchange="setTransferFilter('dateTo',this.value)" style="${inputStyle}">
        </div>
        <div>
          <div style="font-size:.72rem;font-weight:600;color:var(--gray-500);margin-bottom:3px;text-transform:uppercase">Sort By</div>
          <select onchange="setTransferSort(this.value)" style="${selStyle}">
            <option value="date-desc" ${transferSort==='date-desc'?'selected':''}>Date (Newest)</option>
            <option value="date-asc" ${transferSort==='date-asc'?'selected':''}>Date (Oldest)</option>
            <option value="item-az" ${transferSort==='item-az'?'selected':''}>Item (A → Z)</option>
            <option value="item-za" ${transferSort==='item-za'?'selected':''}>Item (Z → A)</option>
            <option value="qty-desc" ${transferSort==='qty-desc'?'selected':''}>Qty (High → Low)</option>
            <option value="qty-asc" ${transferSort==='qty-asc'?'selected':''}>Qty (Low → High)</option>
          </select>
        </div>
      </div>
    </div>`;

    // Apply filters to completed transfers
    const filteredCompleted = applyTransferFilters(completed);

    html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:.82rem;color:var(--gray-500)">Showing ${filteredCompleted.length} of ${completed.length} completed transfers</span>
    </div>`;

    html += `<table><thead><tr>
      <th>Date</th><th>Item</th><th>Qty</th><th>From</th><th>To</th><th>Authorized By</th><th>Status</th><th>Logged By</th>
    </tr></thead><tbody>`;

    if (filteredCompleted.length === 0) {
      html += `<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--gray-400)">No transfers match your filters</td></tr>`;
    } else {
      filteredCompleted.forEach(t => {
        const statusLabel = t.status === 'accepted'
          ? '<span style="color:var(--success);font-weight:700">✓ Accepted</span>'
          : t.status === 'rejected'
            ? '<span style="color:var(--danger);font-weight:700">✗ Rejected</span>'
            : '<span style="color:var(--gray-400)">—</span>';
        html += `<tr>
          <td style="white-space:nowrap">${t.date || '—'}</td>
          <td style="font-weight:600">${t.itemName || '—'}</td>
          <td style="text-align:center;font-weight:700;color:var(--danger)">${t.quantity || 0}</td>
          <td style="font-size:.82rem">${t.fromName || (t.from === 'ondemand-renton' ? 'On Demand Renton' : 'Warehouse')}</td>
          <td style="font-size:.82rem">${t.toName || DEST_NAMES[t.to] || t.to || '—'}</td>
          <td style="font-size:.82rem;font-weight:600">${t.authorizedBy || '—'}</td>
          <td style="font-size:.82rem">${statusLabel}</td>
          <td style="font-size:.82rem;color:var(--gray-500)">${t.transferredBy || '—'}</td>
        </tr>`;
      });
    }
    html += `</tbody></table>`;
  }
  html += `</div>`;
  container.innerHTML = html;
}

// ==================== TOAST ====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 3000);
}
</script>
</body>
</html>
